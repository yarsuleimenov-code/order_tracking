<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Track your order</title>
    <link rel="stylesheet" href="styles.css?v=20260629-order-id-only">
  </head>
  <body>
    <main class="page-shell">
      <section class="search-panel" aria-labelledby="page-title">
        <div class="panel-header">
          <h1 id="page-title">Track your order</h1>
        </div>

        <form id="tracking-form" class="tracking-form" novalidate>
          <div class="field-group">
            <label for="order-id">Order ID</label>
            <input
              id="order-id"
              name="order_id"
              type="text"
              inputmode="numeric"
              autocomplete="off"
              required
            >
          </div>

          <button id="track-button" type="submit">
            <span id="track-button-label">Track order</span>
            <span class="button-spinner" aria-hidden="true"></span>
          </button>
        </form>

        <div id="verified-summary" class="verified-summary hidden">
          <div>
            <p id="verified-order" class="verified-title"></p>
            <p id="verified-lookup" class="description"></p>
          </div>
          <button id="track-another-button" class="secondary-button" type="button">Track another order</button>
        </div>

        <div id="status-message" class="status-message" role="status" aria-live="polite"></div>
      </section>

      <section id="result" class="result-panel hidden" aria-live="polite">
        <header class="result-header">
          <div>
            <p id="current-status" class="status-pill"></p>
            <h2 id="result-order"></h2>
            <p id="status-description" class="result-description"></p>
            <div class="next-step">
              <p class="label">Next step</p>
              <p id="next-step-text"></p>
            </div>
          </div>
          <div class="last-updated">
            <p class="label">Last updated</p>
            <p id="last-updated" class="value small-value"></p>
          </div>
        </header>

        <div class="details-grid">
          <section class="detail-section" aria-labelledby="pickup-heading">
            <div class="detail-heading">
              <p id="pickup-heading" class="label">Pickup appointment</p>
            </div>
            <div class="detail-body">
              <p id="pickup-date" class="value"></p>
              <p id="pickup-window" class="description"></p>
            </div>
          </section>

          <section class="detail-section" aria-labelledby="delivery-heading">
            <div class="detail-heading">
              <p id="delivery-heading" class="label">Delivery</p>
              <p id="delivery-label-value" class="description"></p>
            </div>
            <div class="detail-body">
              <p id="delivery-date" class="value"></p>
              <p id="delivery-window" class="description"></p>
            </div>
          </section>
        </div>

        <section class="progress-block" aria-labelledby="progress-heading">
          <div class="progress-header">
            <h3 id="progress-heading">Progress</h3>
          </div>
          <ol id="timeline" class="timeline"></ol>
        </section>

        <footer class="result-footer">
          <a id="contact-support-link" class="support-link" href="mailto:support@example.com">Contact support</a>
        </footer>
      </section>
    </main>

    <script src="app.js?v=20260629-order-id-only"></script>
  </body>
</html>
